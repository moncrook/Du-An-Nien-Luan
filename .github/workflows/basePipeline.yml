name: Base Pipeline

on:
    push:
        branches: ["main"]

jobs:
    Code-lint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: cài đặt các thư viện
              run: npm install
            
            - name: kiểm tra cú pháp
              run: npm run lint